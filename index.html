<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Eventos" />
  
  <title>Eventos A, AA y AAA</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
    }

    .wrap {
      width: 100vw;
      height: 100vh;
      box-sizing: border-box;
      padding: 12px;
    }

    .card {
      width: 100%;
      height: 100%;
      background: #111;
      border: 1px solid #222;
      border-radius: 14px;
      padding: 12px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    .filters {
      margin-bottom: 10px;
    }

    label {
      font-weight: 600;
      margin-right: 8px;
      font-size: 14px;
    }

    select {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #000;
      color: #fff;
      font-size: 14px;
    }

    .chart-box {
      flex: 1;
      min-height: 0;
      position: relative;
      width: 100%;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
      background: #000;
    }

    @media (max-width: 768px) {
      h2 {
        font-size: 16px;
      }

      label, select {
        font-size: 13px;
      }

      .card {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>Aforo máximo por tipo de evento</h2>

      <div class="filters">
        <label for="tipo">Tipo de evento:</label>
        <select id="tipo" onchange="renderChart()">
          <option value="TODOS">Todos</option>
          <option value="A">A</option>
          <option value="AA">AA</option>
          <option value="AAA">AAA</option>
        </select>
      </div>

      <div class="chart-box">
        <canvas id="chart"></canvas>
      </div>
    </div>
  </div>

  <script>
    Chart.register(ChartDataLabels);

    const data = [
      { fecha: '2026-06-11', tipo: 'AA', aforo: 16029 },
      { fecha: '2026-06-12', tipo: 'AA', aforo: 11266 },
      { fecha: '2026-06-13', tipo: 'AAA', aforo: 63616 },
      { fecha: '2026-06-14', tipo: 'AAA', aforo: 29814, etiqueta: 'Caballo Dorado' },
      { fecha: '2026-06-15', tipo: 'A', aforo: 0 },
      { fecha: '2026-06-16', tipo: 'A', aforo: 3983 },
      { fecha: '2026-06-17', tipo: 'A', aforo: 3211 },
      { fecha: '2026-06-18', tipo: 'AA', aforo: 105089, etiqueta: 'Mex vs Corea' },
      { fecha: '2026-06-19', tipo: 'AA', aforo: 600 },
      { fecha: '2026-06-20', tipo: 'A', aforo: 29361 },
      { fecha: '2026-06-21', tipo: 'AAA', aforo: 80006, etiqueta: 'IMAGIN DRAGONS' },
      { fecha: '2026-06-22', tipo: 'A', aforo: 3206 },
      { fecha: '2026-06-24', tipo: 'AA', aforo: 46169, etiqueta: 'Mex vs Rep Checa' },
      { fecha: '2026-06-25', tipo: 'AAA', aforo: 108239, etiqueta: 'GRUPO FIRME' },
      { fecha: '2026-06-26', tipo: 'A', aforo: 9108 },
      { fecha: '2026-06-27', tipo: 'AA', aforo: 42981 },
      { fecha: '2026-06-28', tipo: 'AAA', aforo: 109313, etiqueta: 'ENRIQUE IGLESIAS' },
      { fecha: '2026-06-29', tipo: 'AA', aforo: 57799 },
      { fecha: '2026-06-30', tipo: 'AAA', aforo: 125835, etiqueta: 'MEX VS ECUADOR' },
      { fecha: '2026-07-01', tipo: 'A', aforo: 1916 },
      { fecha: '2026-07-02', tipo: 'A', aforo: 15212 },
      { fecha: '2026-07-03', tipo: 'AA', aforo: 14977 },
      { fecha: '2026-07-04', tipo: 'AA', aforo: 37800 },
      { fecha: '2026-07-05', tipo: 'AAA', aforo: 30377 },
      { fecha: '2026-07-06', tipo: 'A', aforo: 1936 },
      { fecha: '2026-07-07', tipo: 'AA', aforo: 13089 },
      { fecha: '2026-07-09', tipo: 'A', aforo: 2629 },
      { fecha: '2026-07-10', tipo: 'AA', aforo: 20207 },
      { fecha: '2026-07-11', tipo: 'AA', aforo: 24871 }
    ];

    const colors = {
      A: '#4ea1ff',
      AA: '#ff9f43',
      AAA: '#55efc4'
    };

    const ctx = document.getElementById('chart').getContext('2d');
    let chart;

    function formatDate(iso) {
      const [y, m, d] = iso.split('-');
      return `${d}/${m}/${y}`;
    }

    function renderChart() {
      const tipo = document.getElementById('tipo').value;
      const tipos = tipo === 'TODOS' ? ['A', 'AA', 'AAA'] : [tipo];
      const labels = [...new Set(data.map(d => d.fecha))].sort();

      const datasets = tipos.map(t => {
        const map = new Map(data.filter(d => d.tipo === t).map(d => [d.fecha, d]));

        return {
          label: t,
          data: labels.map(f => map.has(f) ? map.get(f).aforo : null),
          backgroundColor: colors[t],
          borderColor: colors[t],
          borderWidth: 1,
          borderRadius: 4,
          barThickness: window.innerWidth < 768 ? 12 : 22,
          maxBarThickness: window.innerWidth < 768 ? 14 : 28,
          categoryPercentage: 0.9,
          barPercentage: 0.98
        };
      });

      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels.map(formatDate),
          datasets
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          layout: {
            padding: { top: 10, right: 8, bottom: 0, left: 8 }
          },
          plugins: {
            legend: {
              labels: { color: '#fff', font: { size: window.innerWidth < 768 ? 10 : 12 } }
            },
            datalabels: {
              display: function(context) {
                const item = data.find(d => {
                  const label = formatDate(d.fecha);
                  return label === context.chart.data.labels[context.dataIndex] && d.tipo === context.dataset.label;
                });
                return !!(item && item.etiqueta);
              },
              color: '#fff',
              font: {
                weight: 'bold',
                size: window.innerWidth < 768 ? 9 : 11
              },
              anchor: 'end',
              align: 'start',
              clamp: true,
              formatter: function(value, context) {
                const item = data.find(d => {
                  const label = formatDate(d.fecha);
                  return label === context.chart.data.labels[context.dataIndex] && d.tipo === context.dataset.label;
                });
                return item && item.etiqueta ? item.etiqueta : '';
              }
            },
            tooltip: {
              backgroundColor: '#111',
              titleColor: '#fff',
              bodyColor: '#fff',
              callbacks: {
                label: function(c) {
                  const item = data.find(d => {
                    const label = formatDate(d.fecha);
                    return label === c.label && d.tipo === c.dataset.label;
                  });
                  const base = `${c.dataset.label}: ${c.raw == null ? 'Sin dato' : c.raw.toLocaleString('es-MX')}`;
                  return item && item.etiqueta ? `${base} | ${item.etiqueta}` : base;
                }
              }
            }
          },
          scales: {
            x: {
              ticks: {
                color: '#fff',
                maxRotation: window.innerWidth < 768 ? 70 : 60,
                minRotation: window.innerWidth < 768 ? 70 : 60,
                font: { size: window.innerWidth < 768 ? 9 : 11 }
              },
              grid: {
                color: 'rgba(255,255,255,0.08)'
              }
            },
            y: {
              beginAtZero: true,
              ticks: {
                color: '#fff',
                font: { size: window.innerWidth < 768 ? 9 : 11 }
              },
              grid: {
                color: 'rgba(255,255,255,0.08)'
              }
            }
          }
        },
        plugins: [ChartDataLabels]
      });
    }

    window.addEventListener('resize', () => {
      renderChart();
    });

    renderChart();
  </script>
</body>
</html>

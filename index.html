<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timeline eventos A, AA y AAA</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #000;
      color: #fff;
    }
    .card {
      max-width: 1500px;
      margin: 0 auto;
      background: #111;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 10px rgba(255,255,255,.08);
      border: 1px solid #222;
    }
    h2 {
      margin-top: 0;
      margin-bottom: 16px;
      color: #fff;
    }
    .filters {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .filters label {
      font-weight: 600;
      color: #fff;
    }
    .filters select {
      padding: 8px 10px;
      border: 1px solid #444;
      border-radius: 8px;
      min-width: 180px;
      background: #000;
      color: #fff;
    }
    .chart-wrap {
      position: relative;
      height: 580px;
    }
    canvas {
      width: 100% !important;
      height: 100% !important;
      background: #000;
    }
    .note {
      margin-top: 12px;
      font-size: 14px;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Aforo máximo por tipo de evento</h2>

    <div class="filters">
      abel for="tipo">Tipo de evento:</label>
      <select id="tipo" onchange="renderChart()">
        <option value="TODOS">Todos</option>
        <option value="A">A</option>
        <option value="AA">AA</option>
        <option value="AAA">AAA</option>
      </select>
    </div>

    <div class="chart-wrap">
      anvas id="timelineChart"></canvas>
    </div>

    <div class="note">
      Fondo negro, barras agrupadas y filtro por tipo de evento.
    </div>
  </div>

  <script>
    const dataOriginal = [
      { fecha: '2026-06-11', tipo: 'AA', aforo: 16029 },
      { fecha: '2026-06-12', tipo: 'AA', aforo: 11266 },
      { fecha: '2026-06-13', tipo: 'AAA', aforo: 63616 },
      { fecha: '2026-06-14', tipo: 'AAA', aforo: 29814 },
      { fecha: '2026-06-15', tipo: 'A', aforo: 0 },
      { fecha: '2026-06-16', tipo: 'A', aforo: 3983 },
      { fecha: '2026-06-17', tipo: 'A', aforo: 3211 },
      { fecha: '2026-06-18', tipo: 'AA', aforo: 105089 },
      { fecha: '2026-06-19', tipo: 'AA', aforo: 600 },
      { fecha: '2026-06-20', tipo: 'A', aforo: 29361 },
      { fecha: '2026-06-21', tipo: 'A', aforo: 80006 },
      { fecha: '2026-06-22', tipo: 'A', aforo: 3206 },
      { fecha: '2026-06-24', tipo: 'AA', aforo: 26619 },
      { fecha: '2026-06-25', tipo: 'AAA', aforo: 108239 },
      { fecha: '2026-06-26', tipo: 'A', aforo: 9108 },
      { fecha: '2026-06-27', tipo: 'AA', aforo: 42981 },
      { fecha: '2026-06-28', tipo: 'AAA', aforo: 109313 },
      { fecha: '2026-06-29', tipo: 'AA', aforo: 57799 },
      { fecha: '2026-06-30', tipo: 'AAA', aforo: 125835 },
      { fecha: '2026-07-01', tipo: 'A', aforo: 1916 },
      { fecha: '2026-07-02', tipo: 'A', aforo: 15212 },
      { fecha: '2026-07-03', tipo: 'AA', aforo: 14977 },
      { fecha: '2026-07-04', tipo: 'AA', aforo: 37800 },
      { fecha: '2026-07-05', tipo: 'AAA', aforo: 30377 },
      { fecha: '2026-07-06', tipo: 'A', aforo: 1936 },
      { fecha: '2026-07-07', tipo: 'AA', aforo: 13089 },
      { fecha: '2026-07-08', tipo: 'A', aforo: 0 },
      { fecha: '2026-07-09', tipo: 'A', aforo: 2629 },
      { fecha: '2026-07-10', tipo: 'AA', aforo: 20207 },
      { fecha: '2026-07-11', tipo: 'AA', aforo: 24871 }
    ];

    const colores = {
      A: '#4ea1ff',
      AA: '#ff9f43',
      AAA: '#55efc4'
    };

    const ctx = document.getElementById('timelineChart').getContext('2d');
    let chart;

    function formatearFecha(fechaISO) {
      const [y, m, d] = fechaISO.split('-');
      return `${d}/${m}/${y}`;
    }

    function renderChart() {
      const tipoFiltro = document.getElementById('tipo').value;
      const tipos = tipoFiltro === 'TODOS' ? ['A', 'AA', 'AAA'] : [tipoFiltro];
      const fechas = [...new Set(dataOriginal.map(i => i.fecha))].sort();

      const datasets = tipos.map(tipo => {
        const mapa = new Map(
          dataOriginal
            .filter(i => i.tipo === tipo)
            .map(i => [i.fecha, i.aforo])
        );

        return {
          label: tipo,
          data: fechas.map(f => mapa.has(f) ? mapa.get(f) : null),
          backgroundColor: colores[tipo],
          borderColor: colores[tipo],
          borderWidth: 1,
          borderRadius: 4
        };
      });

      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: fechas.map(formatearFecha),
          datasets: datasets
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'top',
              labels: {
                color: '#fff'
              }
            },
            title: {
              display: true,
              text: 'Timeline de eventos A, AA y AAA',
              color: '#fff'
            },
            tooltip: {
              backgroundColor: '#111',
              titleColor: '#fff',
              bodyColor: '#fff',
              callbacks: {
                label: function(context) {
                  const v = context.raw;
                  return context.dataset.label + ': ' + (v === null ? 'Sin dato' : v.toLocaleString('es-MX'));
                }
              }
            }
          },
          scales: {
            x: {
              title: {
                display: true,
                text: 'Fecha',
                color: '#fff'
              },
              ticks: {
                color: '#fff',
                maxRotation: 60,
                minRotation: 60
              },
              grid: {
                color: 'rgba(255,255,255,0.08)'
              }
            },
            y: {
              beginAtZero: true,
              title: {
                display: true,
                text: 'Aforo máximo',
                color: '#fff'
              },
              ticks: {
                color: '#fff'
              },
              grid: {
                color: 'rgba(255,255,255,0.08)'
              }
            }
          }
        }
      });
    }

    renderChart();
  </script>
</body>
</html>
